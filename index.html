<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Redirect</title>
  <script>
  (function () {
    var links = [
      "https://t.me/Elaine_168888"
    ];

    var bagKey = "tg_shuffle_bag_v1";
    var idxKey = "tg_shuffle_idx_v1";

    function shuffle(arr) {
      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      }
      return arr;
    }

    var bag;
    try {
      bag = JSON.parse(localStorage.getItem(bagKey) || "null");
    } catch(e) {
      bag = null;
    }

    if (!Array.isArray(bag) || bag.length !== links.length) {
      bag = shuffle(links.slice());
      localStorage.setItem(bagKey, JSON.stringify(bag));
      localStorage.setItem(idxKey, "0");
    }

    var idx = parseInt(localStorage.getItem(idxKey) || "0", 10);
    if (!isFinite(idx) || idx < 0) idx = 0;

    var url = bag[idx % bag.length];
    idx++;

    if (idx % bag.length === 0) {
      bag = shuffle(links.slice());
      localStorage.setItem(bagKey, JSON.stringify(bag));
      idx = 0;
    }

    localStorage.setItem(idxKey, String(idx));

    window.location.replace(url);
  })();
  </script>
</head>
<body></body>
</html>
